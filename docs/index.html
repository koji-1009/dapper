<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dapper - A simple Markdown and YAML formatter for Dart. Try the interactive demo.">
  <title>Dapper - Markdown & YAML Formatter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>✨ Dapper</h1>
      <p class="tagline">A simple Markdown & YAML formatter for Dart</p>
      <nav class="links" aria-label="Project links">
        <a href="https://github.com/koji-1009/dapper" target="_blank" rel="noopener">GitHub</a>
        <a href="https://pub.dev/packages/dapper" target="_blank" rel="noopener">pub.dev</a>
      </nav>
    </header>

    <main>
      <div class="tabs" role="tablist" aria-label="Format type">
        <button class="tab active" role="tab" aria-selected="true" data-format="markdown">Markdown</button>
        <button class="tab" role="tab" aria-selected="false" data-format="yaml">YAML</button>
      </div>

      <div class="options" id="markdownOptions">
        <div class="option-group">
          <label for="proseWrap">Prose Wrap</label>
          <select id="proseWrap">
            <option value="preserve" selected>preserve</option>
            <option value="always">always</option>
            <option value="never">never</option>
          </select>
        </div>
        <div class="option-group">
          <label for="printWidth">Print Width</label>
          <input type="number" id="printWidth" value="80" min="40" max="200">
        </div>
        <div class="option-group">
          <label for="ulStyle">List Style</label>
          <select id="ulStyle">
            <option value="asterisk" selected>asterisk (*)</option>
            <option value="dash">dash (-)</option>
            <option value="plus">plus (+)</option>
          </select>
        </div>
      </div>

      <div class="editor-container">
        <div class="panel">
          <div class="panel-header">
            <label for="input">Input</label>
            <div class="sample-buttons">
              <button class="sample-btn" data-sample="empty">Empty</button>
              <button class="sample-btn" data-sample="markdown-messy" data-format="markdown">Messy MD</button>
              <button class="sample-btn" data-sample="markdown-table" data-format="markdown">Table</button>
              <button class="sample-btn" data-sample="yaml-messy" data-format="yaml">Messy YAML</button>
            </div>
          </div>
          <textarea id="input" placeholder="Enter your Markdown or YAML here..."></textarea>
        </div>

        <div class="divider">
          <button id="formatBtn" aria-label="Format">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              aria-hidden="true">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <div class="panel">
          <div class="panel-header">
            <label for="output">Output</label>
            <button id="copyBtn" class="copy-btn" aria-label="Copy to clipboard">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
              </svg>
            </button>
          </div>
          <textarea id="output" placeholder="Formatted output will appear here..." readonly></textarea>
        </div>
      </div>

      <div id="error" class="error hidden" role="alert"></div>
    </main>

    <footer>
      <p>Built with <a href="https://dart.dev" target="_blank" rel="noopener">Dart</a> • <a
          href="https://github.com/koji-1009/dapper/blob/main/LICENSE" target="_blank" rel="noopener">MIT License</a>
      </p>
    </footer>
  </div>

  <script src="dapper.js" defer></script>
  <script>
    (() => {
      const samples = {
        'markdown-messy': `# Hello World

*emphasis* and **strong** text with ___mixed styles___

- item 1
  -   nested item with extra spaces
      - deeply nested
* mixed bullet styles
+ cause inconsistency

1. First
2.  Second with extra space
10.  Numbers misaligned

| Name | Age |
|--|--|
| Alice | 30 |
| Bob | 25 |
`,
        'markdown-table': `| Name | Age | City | Country |
|--|--|--|--|
|Alice|30|Tokyo|Japan|
|Bob|25|New York|USA|
|Charlie|35|London|UK|
`,
        'yaml-messy': `# Application config
name:   myapp
version:  1.0.0
dependencies:
    flutter:
         sdk:  flutter
    http:    ^0.13.0
    json_annotation:   ^4.8.0

dev_dependencies:
  build_runner:   ^2.4.0
  json_serializable:  ^6.7.0
`
      };

      const $ = (id) => document.getElementById(id);
      const inputEl = $('input');
      const outputEl = $('output');
      const errorEl = $('error');
      const copyBtn = $('copyBtn');
      const markdownOptionsEl = $('markdownOptions');
      const proseWrapEl = $('proseWrap');
      const printWidthEl = $('printWidth');
      const ulStyleEl = $('ulStyle');
      const tabs = document.querySelectorAll('.tab');
      const sampleBtns = document.querySelectorAll('.sample-btn');

      let currentFormat = 'markdown';
      let debounceTimer;

      function updateSampleButtons() {
        sampleBtns.forEach(btn => {
          const btnFormat = btn.dataset.format;
          btn.style.display = (!btnFormat || btnFormat === currentFormat) ? '' : 'none';
        });
      }

      function format() {
        const input = inputEl.value;
        if (!input.trim()) {
          outputEl.value = '';
          errorEl.classList.add('hidden');
          return;
        }

        try {
          let result;
          if (currentFormat === 'markdown') {
            result = formatMarkdown(input, {
              proseWrap: proseWrapEl.value,
              printWidth: parseInt(printWidthEl.value, 10),
              ulStyle: ulStyleEl.value,
            });
          } else {
            result = formatYaml(input);
          }
          errorEl.classList.add('hidden');
          outputEl.value = result;
        } catch (err) {
          errorEl.textContent = err.message || String(err);
          errorEl.classList.remove('hidden');
          outputEl.value = '';
        }
      }

      // Tab switching
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => {
            t.classList.remove('active');
            t.setAttribute('aria-selected', 'false');
          });
          tab.classList.add('active');
          tab.setAttribute('aria-selected', 'true');
          currentFormat = tab.dataset.format;
          markdownOptionsEl.style.display = currentFormat === 'markdown' ? 'flex' : 'none';
          updateSampleButtons();
          format();
        });
      });

      // Sample buttons
      sampleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const sampleKey = btn.dataset.sample;
          if (sampleKey === 'empty') {
            inputEl.value = '';
            outputEl.value = '';
            errorEl.classList.add('hidden');
          } else if (samples[sampleKey]) {
            inputEl.value = samples[sampleKey];
            format();
          }
        });
      });

      // Format button
      $('formatBtn').addEventListener('click', format);

      // Auto-format on input change (debounced)
      inputEl.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(format, 300);
      });

      // Option changes
      [proseWrapEl, printWidthEl, ulStyleEl].forEach(el => {
        el.addEventListener('change', format);
      });

      // Copy button
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(outputEl.value);
          copyBtn.classList.add('copied');
          setTimeout(() => copyBtn.classList.remove('copied'), 1500);
        } catch (err) {
          console.error('Failed to copy:', err);
        }
      });

      // Initialize after deferred scripts are loaded
      document.addEventListener('DOMContentLoaded', () => {
        inputEl.value = samples['markdown-messy'];
        updateSampleButtons();
        format();
      });
    })();
  </script>
</body>

</html>
